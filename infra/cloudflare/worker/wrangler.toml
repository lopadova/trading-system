name = "ts"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "trading-db"
database_id = "6d7a686a-000d-495d-bea2-e71dfe1e63c8"
# To create: wrangler d1 create trading-db
# Then replace the database_id above with the output

# Analytics Engine dataset (Phase 7.3 observability)
# Emits counters for ingest event types, auth failures, D1 errors.
# Query via the Cloudflare dashboard > Workers > Analytics tab, or SQL API.
[[analytics_engine_datasets]]
binding = "METRICS"
dataset = "trading_system_metrics"

[vars]
DASHBOARD_ORIGIN = "http://localhost:5173"
# For production, set to actual dashboard URL: https://trading.example.com

# Secrets (set via: wrangler secret put <SECRET_NAME>)
# API_KEY - Authentication key for protected endpoints
# ANTHROPIC_API_KEY - For EasyLanguage → SDF conversion in wizard
# TELEGRAM_BOT_TOKEN - For Telegram bot integration
# DISCORD_BOT_TOKEN - For Discord bot integration (optional)
# DISCORD_PUBLIC_KEY - For Discord webhook signature verification
# BOT_WHITELIST - Comma-separated list of allowed user IDs (Telegram or Discord)
