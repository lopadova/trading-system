name: .NET Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-test:
    name: Build and Test .NET Services
    runs-on: windows-latest
    permissions:
      # dorny/test-reporter creates GitHub Check Runs — without `checks: write`
      # GitHub Actions default tokens can't publish the TRX results and the
      # step fails with "Resource not accessible by integration".
      # `pull-requests: write` lets the reporter attach the summary to PRs.
      contents: read
      checks: write
      pull-requests: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore TradingSystem.sln

    - name: Build solution
      run: dotnet build TradingSystem.sln --configuration Release --no-restore

    - name: Run tests
      run: dotnet test TradingSystem.sln --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

    - name: Publish test results
      uses: dorny/test-reporter@v1
      # Defensive: if token permissions ever get clipped (forks, etc.), a
      # reporter failure should NOT mask a genuine build/test failure.
      continue-on-error: true
      if: always()
      with:
        name: .NET Test Results
        path: '**/test-results.trx'
        reporter: dotnet-trx

    - name: Upload artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          src/*/bin/Release/**
          !src/*/bin/Release/**/ref/**
        retention-days: 7

  # ⚠ DISABLED until Phase 7 production-readiness (per Lorenzo).
  # Re-enable by removing `false &&` once the production runbook is signed off.
  publish-services:
    name: Publish Windows Services
    runs-on: windows-latest
    needs: build-and-test
    if: false && github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Publish TradingSupervisorService
      run: |
        dotnet publish src/TradingSupervisorService/TradingSupervisorService.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -o publish/TradingSupervisorService

    - name: Publish OptionsExecutionService
      run: |
        dotnet publish src/OptionsExecutionService/OptionsExecutionService.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -o publish/OptionsExecutionService

    - name: Upload publish artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-services
        path: publish/
        retention-days: 30
