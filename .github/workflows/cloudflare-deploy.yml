name: Cloudflare Worker & Dashboard Deploy

# Deploy model (post Phase 7.7):
#   - Push / merge to main → auto-deploy to STAGING.
#   - Git tag matching v*.*.* (e.g. v1.2.3, v1.2.3-rc1) → auto-deploy to
#     PRODUCTION. See docs/ops/RELEASE.md for the tag-cutting procedure.
#   - workflow_dispatch → emergency-only manual override for production
#     (e.g. the tag workflow itself is broken). NOT the normal path.
#
# `paths:` only filters branch-push events; tag-push events ignore it, so
# any `v*.*.*` tag triggers the workflow regardless of touched files.
on:
  push:
    branches: [ main ]
    # No `paths:` filter here on purpose: per GitHub's rules, `paths`
    # combines with BOTH `branches` AND `tags` as AND, so a release tag
    # cut on a docs-only commit would fail to trigger the prod deploy.
    # The test jobs finish in ~3 min so running them on every main push
    # (even docs-only) is an acceptable price for tag-deploy reliability.
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'

jobs:
  test-worker:
    name: Test Cloudflare Worker
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: npm
        cache-dependency-path: infra/cloudflare/worker/package-lock.json

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      working-directory: infra/cloudflare/worker
      # Use npm ci (deterministic, lockfile-enforced). bun install has
      # recurring tarball extraction failures for @img/sharp-libvips-linux-x64.
      run: npm ci --no-audit --no-fund

    - name: Run tests
      working-directory: infra/cloudflare/worker
      run: bun test

    - name: Build worker
      working-directory: infra/cloudflare/worker
      run: bun run build

  test-dashboard:
    name: Test Dashboard
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: npm
        cache-dependency-path: dashboard/package-lock.json

    - name: Install dependencies
      working-directory: dashboard
      run: npm ci --no-audit --no-fund

    - name: Run tests
      working-directory: dashboard
      # Dashboard tests MUST use `npm test` (vitest), NOT `bun test`.
      # Bun's test runner lacks DOM/browser-env support required by
      # @testing-library/react.
      run: npm test

    - name: Build dashboard
      working-directory: dashboard
      run: npm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dashboard-dist
        path: dashboard/dist/
        retention-days: 7

  # Production deploy — triggered by pushing a v*.*.* tag to main.
  #
  # Re-enabled in Phase 7.7. The tag-based trigger means a production
  # deploy is always tied to a deliberate release cut (see
  # docs/ops/RELEASE.md). workflow_dispatch remains as an emergency-only
  # override for when the tag workflow itself is broken. The GitHub
  # `environment: production` binding still applies its reviewer-required
  # protection rule on top (per docs/ops/BRANCH_PROTECTION.md § 4).
  deploy-worker:
    name: Deploy Worker to Cloudflare (production)
    runs-on: ubuntu-latest
    needs: [test-worker, test-dashboard]
    # Runs on: (a) v*.*.* tag push, or (b) manual workflow_dispatch.
    # Never on a plain branch push — staging is the target for that.
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      github.event_name == 'workflow_dispatch'
    environment:
      name: production
      url: https://trading-bot.padosoft.workers.dev

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check for Cloudflare API token
      id: check-token
      run: |
        if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
          echo "skip=true" >> $GITHUB_OUTPUT
          echo "⚠️ CLOUDFLARE_API_TOKEN not configured - skipping deployment"
        else
          echo "skip=false" >> $GITHUB_OUTPUT
        fi

    - name: Setup Node
      if: steps.check-token.outputs.skip != 'true'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: npm
        cache-dependency-path: infra/cloudflare/worker/package-lock.json

    - name: Install dependencies
      if: steps.check-token.outputs.skip != 'true'
      working-directory: infra/cloudflare/worker
      run: npm ci --no-audit --no-fund

    - name: Deploy to Cloudflare Workers
      if: steps.check-token.outputs.skip != 'true'
      working-directory: infra/cloudflare/worker
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      run: npx wrangler deploy

  # Staging auto-deploy — runs on every push to main. NO environment
  # protection (the point of staging is to catch things before prod).
  deploy-worker-staging:
    name: Deploy Worker to Cloudflare (staging)
    runs-on: ubuntu-latest
    needs: [test-worker, test-dashboard]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: https://ts-staging.padosoft.workers.dev

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check for Cloudflare API token
      id: check-token
      run: |
        if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
          echo "skip=true" >> $GITHUB_OUTPUT
          echo "⚠️ CLOUDFLARE_API_TOKEN not configured - skipping deployment"
        else
          echo "skip=false" >> $GITHUB_OUTPUT
        fi

    - name: Setup Node
      if: steps.check-token.outputs.skip != 'true'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: npm
        cache-dependency-path: infra/cloudflare/worker/package-lock.json

    - name: Install dependencies
      if: steps.check-token.outputs.skip != 'true'
      working-directory: infra/cloudflare/worker
      run: npm ci --no-audit --no-fund

    - name: Deploy to Cloudflare Workers (staging)
      if: steps.check-token.outputs.skip != 'true'
      working-directory: infra/cloudflare/worker
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      run: npx wrangler deploy --env staging

  # Production deploy — mirrors deploy-worker's trigger rules. Runs on
  # v*.*.* tag pushes and on emergency workflow_dispatch. See RELEASE.md.
  deploy-dashboard:
    name: Deploy Dashboard to Cloudflare Pages (production)
    runs-on: ubuntu-latest
    needs: [test-worker, test-dashboard]
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      github.event_name == 'workflow_dispatch'
    environment:
      name: production
      url: https://trading-dashboard.pages.dev

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check for Cloudflare API token
      id: check-token
      run: |
        if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
          echo "skip=true" >> $GITHUB_OUTPUT
          echo "⚠️ CLOUDFLARE_API_TOKEN not configured - skipping deployment"
        else
          echo "skip=false" >> $GITHUB_OUTPUT
        fi

    - name: Setup Node
      if: steps.check-token.outputs.skip != 'true'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: npm
        cache-dependency-path: dashboard/package-lock.json

    - name: Install dependencies
      if: steps.check-token.outputs.skip != 'true'
      working-directory: dashboard
      run: npm ci --no-audit --no-fund

    - name: Build dashboard
      if: steps.check-token.outputs.skip != 'true'
      working-directory: dashboard
      run: npm run build

    - name: Deploy to Cloudflare Pages
      if: steps.check-token.outputs.skip != 'true'
      uses: cloudflare/pages-action@v1
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        projectName: trading-dashboard
        directory: dashboard/dist
        gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  # Staging dashboard — auto-deploy on merge to main. No environment
  # protection (mirrors deploy-worker-staging).
  deploy-dashboard-staging:
    name: Deploy Dashboard to Cloudflare Pages (staging)
    runs-on: ubuntu-latest
    needs: [test-worker, test-dashboard]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: https://trading-dashboard-staging.pages.dev

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check for Cloudflare API token
      id: check-token
      run: |
        if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
          echo "skip=true" >> $GITHUB_OUTPUT
          echo "⚠️ CLOUDFLARE_API_TOKEN not configured - skipping deployment"
        else
          echo "skip=false" >> $GITHUB_OUTPUT
        fi

    - name: Setup Node
      if: steps.check-token.outputs.skip != 'true'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: npm
        cache-dependency-path: dashboard/package-lock.json

    - name: Install dependencies
      if: steps.check-token.outputs.skip != 'true'
      working-directory: dashboard
      run: npm ci --no-audit --no-fund

    - name: Build dashboard
      if: steps.check-token.outputs.skip != 'true'
      working-directory: dashboard
      run: npm run build

    # Staging Pages project is distinct so staging traffic doesn't
    # pollute production analytics. Create the project with:
    #   bunx wrangler pages project create trading-dashboard-staging
    - name: Deploy to Cloudflare Pages (staging)
      if: steps.check-token.outputs.skip != 'true'
      uses: cloudflare/pages-action@v1
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        projectName: trading-dashboard-staging
        directory: dashboard/dist
        gitHubToken: ${{ secrets.GITHUB_TOKEN }}
