name: Cloudflare Worker & Dashboard Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'infra/cloudflare/worker/**'
      - 'dashboard/**'
      - '.github/workflows/cloudflare-deploy.yml'
  workflow_dispatch:

jobs:
  test-worker:
    name: Test Cloudflare Worker
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      working-directory: infra/cloudflare/worker
      # Use npm instead of bun in CI: `bun install` has recurring tarball
      # extraction failures for @img/sharp-libvips-linux-x64 (transitive
      # optional dep of wrangler/miniflare). npm handles optional-dep
      # fallback more gracefully than bun as of this writing.
      run: npm install --no-audit --no-fund

    - name: Run tests
      working-directory: infra/cloudflare/worker
      run: bun test

    - name: Build worker
      working-directory: infra/cloudflare/worker
      run: bun run build

  test-dashboard:
    name: Test Dashboard
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      working-directory: dashboard
      run: npm install --no-audit --no-fund

    - name: Run tests
      working-directory: dashboard
      # Dashboard tests MUST use `npm test` (vitest), NOT `bun test`.
      # Bun's test runner lacks DOM/browser-env support required by
      # @testing-library/react.
      run: npm test

    - name: Build dashboard
      working-directory: dashboard
      run: npm run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dashboard-dist
        path: dashboard/dist/
        retention-days: 7

  # ⚠ DISABLED until Phase 7 production-readiness (per Lorenzo).
  deploy-worker:
    name: Deploy Worker to Cloudflare
    runs-on: ubuntu-latest
    needs: [test-worker, test-dashboard]
    if: false && github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://trading-bot.padosoft.workers.dev

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      working-directory: infra/cloudflare/worker
      run: bun install

    - name: Deploy to Cloudflare Workers
      working-directory: infra/cloudflare/worker
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      run: bunx wrangler deploy

  # ⚠ DISABLED until Phase 7 production-readiness (per Lorenzo).
  deploy-dashboard:
    name: Deploy Dashboard to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [test-worker, test-dashboard]
    if: false && github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://trading-dashboard.pages.dev

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      working-directory: dashboard
      run: bun install

    - name: Build dashboard
      working-directory: dashboard
      run: bun run build

    - name: Deploy to Cloudflare Pages
      uses: cloudflare/pages-action@v1
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        projectName: trading-dashboard
        directory: dashboard/dist
        gitHubToken: ${{ secrets.GITHUB_TOKEN }}
