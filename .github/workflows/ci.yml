# Trading System CI/CD Pipeline
# Runs on push to main and pull requests

name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '20.x'

jobs:
  # Job 1: Build and test .NET projects
  dotnet-build-test:
    name: .NET Build & Test
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore TradingSystem.sln

      - name: Build solution
        run: dotnet build TradingSystem.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test TradingSystem.sln --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dotnet-test-results
          path: '**/test-results.trx'

      - name: Publish TradingSupervisorService
        run: |
          dotnet publish src/TradingSupervisorService/TradingSupervisorService.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            -o publish/supervisor/

      - name: Publish OptionsExecutionService
        run: |
          dotnet publish src/OptionsExecutionService/OptionsExecutionService.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            -o publish/options/

      - name: Upload Windows Service binaries
        uses: actions/upload-artifact@v4
        with:
          name: windows-services
          path: publish/

  # Job 2: Build and test Cloudflare Worker
  cloudflare-worker:
    name: Cloudflare Worker Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: infra/cloudflare/worker
        run: bun install

      - name: Run tests
        working-directory: infra/cloudflare/worker
        run: bun test

      - name: Build worker
        working-directory: infra/cloudflare/worker
        run: bun run build

      - name: Upload worker build
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-worker
          path: infra/cloudflare/worker/dist/

  # Job 3: Build and test Dashboard
  dashboard:
    name: Dashboard Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: dashboard
        run: bun install

      - name: Type check
        working-directory: dashboard
        run: bun run typecheck

      - name: Lint
        working-directory: dashboard
        run: bun run lint

      - name: Run tests
        working-directory: dashboard
        run: bun test

      - name: Build dashboard
        working-directory: dashboard
        run: bun run build

      - name: Upload dashboard build
        uses: actions/upload-artifact@v4
        with:
          name: dashboard
          path: dashboard/dist/

  # Job 4: Security checks
  security:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          # Check for potential secrets in code (excluding test files and examples)
          if grep -r "password\s*=\s*['\"]" --include="*.cs" --include="*.ts" --include="*.json" src/ infra/ dashboard/ | grep -v "appsettings.json" | grep -v "example"; then
            echo "ERROR: Found potential hardcoded secrets"
            exit 1
          fi
          echo "No hardcoded secrets found"

      - name: Verify TradingMode is paper
        run: |
          # CRITICAL: Ensure TradingMode is "paper" in default configuration
          if ! grep -q '"TradingMode"[[:space:]]*:[[:space:]]*"paper"' src/OptionsExecutionService/appsettings.json; then
            echo "ERROR: TradingMode is not set to 'paper' in appsettings.json"
            echo "This is a CRITICAL SAFETY violation!"
            exit 1
          fi
          echo "TradingMode is safely set to 'paper'"

      - name: Check gitignore rules
        run: |
          # Verify sensitive paths are in .gitignore
          if ! grep -q "strategies/private/" .gitignore; then
            echo "ERROR: strategies/private/ not in .gitignore"
            exit 1
          fi
          if ! grep -q "*.db" .gitignore; then
            echo "WARNING: *.db not in .gitignore"
          fi
          echo "Gitignore rules verified"

  # Job 5: Deploy (manual trigger only)
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [dotnet-build-test, cloudflare-worker, dashboard, security]
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # Deploy Cloudflare Worker
      - name: Deploy Cloudflare Worker
        working-directory: infra/cloudflare/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          bun install
          npx wrangler deploy

      # Deploy Dashboard to Cloudflare Pages
      - name: Deploy Dashboard
        working-directory: dashboard
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler pages deploy dist/ --project-name=trading-dashboard

      # Note: Windows Services must be deployed manually
      - name: Windows Services Deployment Note
        run: |
          echo "Windows Services binaries are available in artifacts."
          echo "Deploy manually using:"
          echo "  1. Download windows-services artifact"
          echo "  2. Run infra/windows/install-supervisor.ps1"
          echo "  3. Run infra/windows/install-options-engine.ps1"
